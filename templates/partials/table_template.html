<div class="section-card">
  <div class="section-header">
    <div>
      <div class="section-title">Table Title</div>
      <div class="card-muted">Compact table template with actions</div>
    </div>
    <div class="section-actions">
      <button class="btn ghost">Export</button>
      <button class="btn primary">Add New</button>
    </div>
  </div>
  <div class="table-wrapper">
    <table class="table">
      <thead>
        <tr>
          <th>Column</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td data-label="Column">Example row</td>
          <td data-label="Status"><span class="badge success">Active</span></td>
          <td data-label="Actions">
            <div class="table-actions">
              <button class="icon-pill"><svg class="icon sm"><use href="#icon-eye"></use></svg></button>
              <button class="icon-pill"><svg class="icon sm"><use href="#icon-edit"></use></svg></button>
              <button class="icon-pill"><svg class="icon sm"><use href="#icon-trash"></use></svg></button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
