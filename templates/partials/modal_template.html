<div class="modal" id="sampleModal">
  <div class="modal-backdrop" data-modal-close></div>
  <div class="modal-dialog">
    <div class="modal-header">
      <div class="modal-title">Modal Title</div>
      <button class="modal-close" type="button" data-modal-close><svg class="icon sm"><use href="#icon-x"></use></svg></button>
    </div>
    <div class="modal-body">
      <p class="card-muted">Reusable modal shell. Drop any form or details here.</p>
    </div>
    <div class="modal-footer">
      <button class="btn ghost" type="button" data-modal-close>Cancel</button>
      <button class="btn primary" type="button">Confirm</button>
    </div>
  </div>
</div>
